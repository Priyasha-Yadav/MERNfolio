<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#grad)"/>
  <!-- Inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- M letter with code brackets -->
  <g transform="translate(256,256)">
    <!-- Left bracket -->
    <path d="M-160,-100 L-190,-0 L-160,100" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Right bracket -->
    <path d="M160,-100 L190,0 L160,100" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- M letter -->
    <path d="M-100,80 L-100,-80 L-30,20 L0,-40 L30,20 L100,-80 L100,80" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
